<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starting 5 Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--card:#1a1a28;--card-hover:#222236;
  --surface:#252540;--surface2:#2e2e4a;
  --text:#e8e8f0;--text2:#b0b0c8;--muted:#6e6e8a;
  --accent:#6c5ce7;--accent2:#a78bfa;--accent-glow:rgba(108,92,231,.25);
  --team-a:#e74c3c;--team-a-dim:rgba(231,76,60,.15);--team-a-med:rgba(231,76,60,.3);
  --team-b:#3498db;--team-b-dim:rgba(52,152,219,.15);--team-b-med:rgba(52,152,219,.3);
  --green:#2ecc71;--red:#e74c3c;--gold:#f1c40f;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 12px 48px rgba(0,0,0,.5);
  --radius:14px;--radius-sm:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px 60px;line-height:1.5}
.header{text-align:center;margin-bottom:28px;padding-top:8px}
.header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent2),var(--accent),#e74c3c,#3498db);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--muted);font-size:.85rem;margin-top:4px;font-weight:500}

.arena{display:grid;grid-template-columns:1fr 80px 1fr;gap:16px;max-width:1120px;margin:0 auto;align-items:start}
@media(max-width:860px){.arena{grid-template-columns:1fr;gap:12px}.vs-col{order:-1;padding:0;flex-direction:row;justify-content:center}}

.team-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.team-card:hover{border-color:var(--border2)}
.team-a .team-stripe{height:3px;background:linear-gradient(90deg,var(--team-a),transparent)}
.team-b .team-stripe{height:3px;background:linear-gradient(90deg,transparent,var(--team-b))}
.team-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.team-a .team-dot{background:var(--team-a);box-shadow:0 0 8px var(--team-a)}
.team-b .team-dot{background:var(--team-b);box-shadow:0 0 8px var(--team-b)}
.team-header input{flex:1;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 14px;color:var(--text);font-size:.95rem;font-weight:700;font-family:inherit;transition:all .2s}
.team-header input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

.roster{padding:10px 16px 16px}
.pos-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;position:relative}
.pos-label{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;flex-shrink:0;letter-spacing:.02em}
.team-a .pos-label{background:var(--team-a-dim);color:var(--team-a);border:1px solid var(--team-a-med)}
.team-b .pos-label{background:var(--team-b-dim);color:var(--team-b);border:1px solid var(--team-b-med)}
.pos-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:.85rem;color:var(--text);font-family:inherit;transition:all .2s}
.pos-row input::placeholder{color:var(--muted)}
.pos-row input:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-glow)}

.ac-list{position:absolute;top:calc(100% + 4px);left:42px;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:100;max-height:220px;overflow-y:auto;display:none}
.ac-list.show{display:block}
.ac-list::-webkit-scrollbar{width:4px}
.ac-list::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}
.ac-item{padding:9px 14px;cursor:pointer;font-size:.82rem;display:flex;justify-content:space-between;align-items:center;transition:background .1s;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--surface)}
.ac-item .ac-name{font-weight:600}
.ac-item .ac-meta{display:flex;align-items:center;gap:6px}
.ac-item .ac-pos{color:var(--muted);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.ac-item .ac-ovr{background:var(--accent);color:#fff;font-size:.68rem;padding:2px 7px;border-radius:5px;font-weight:800}
.ac-item .ac-stats{font-size:.65rem;color:var(--text2);margin-left:2px}

.vs-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding-top:70px}
.vs-badge{width:56px;height:56px;border-radius:50%;background:var(--surface);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-weight:900;font-size:.85rem;position:relative}
.vs-badge::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--team-a),var(--accent),var(--team-b),var(--accent),var(--team-a));opacity:.3;z-index:-1;filter:blur(1px)}
.sim-btn{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 32px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 20px var(--accent-glow);letter-spacing:.01em}
.sim-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--accent-glow);filter:brightness(1.1)}
.sim-btn:active{transform:translateY(0)}

.results-panel{max-width:1120px;margin:28px auto 0;display:none}
.results-panel.show{display:block}
.panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-header h2{font-size:1.05rem;font-weight:700}
.panel-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em}
.panel-body{padding:20px}

.win-prob{margin-bottom:24px}
.win-prob-labels{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.82rem;font-weight:700}
.win-prob-labels .team-a-label{color:var(--team-a)}
.win-prob-labels .team-b-label{color:var(--team-b)}
.win-bar{height:36px;border-radius:10px;overflow:hidden;display:flex;background:var(--surface)}
.win-bar .bar-a{background:linear-gradient(90deg,var(--team-a),rgba(231,76,60,.7));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.8rem;transition:width .8s cubic-bezier(.4,0,.2,1);text-shadow:0 1px 3px rgba(0,0,0,.4)}
.win-bar .bar-b{background:linear-gradient(90deg,rgba(52,152,219,.7),var(--team-b));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.8rem;transition:width .8s cubic-bezier(.4,0,.2,1);text-shadow:0 1px 3px rgba(0,0,0,.4)}

.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:700px){.analysis-grid{grid-template-columns:1fr}}
.analysis-card{background:var(--bg2);border-radius:var(--radius-sm);padding:16px 18px;border:1px solid var(--border)}
.analysis-card h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px;font-weight:700}
.analysis-card p{font-size:.85rem;color:var(--text2);line-height:1.65}
.analysis-card .hl{color:var(--text);font-weight:600}
.analysis-card .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:8px}
.analysis-card .sg-row{display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;border-bottom:1px solid var(--border)}
.analysis-card .sg-row:last-child{border-bottom:none}
.sg-label{color:var(--muted);font-weight:600}
.sg-val-a{color:var(--team-a);font-weight:700}
.sg-val-b{color:var(--team-b);font-weight:700}
.sg-val-win{text-decoration:underline;text-underline-offset:2px}

.matchup-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.83rem;margin-bottom:20px}
.matchup-table th{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border2);font-weight:700;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.matchup-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.matchup-table tr:last-child td{border-bottom:none}
.matchup-table tr:hover td{background:var(--bg2)}
.player-cell{display:flex;flex-direction:column;gap:2px}
.player-name{font-weight:600;font-size:.85rem}
.player-stats{font-size:.7rem;color:var(--accent2);font-weight:600;letter-spacing:.01em}
.player-detail{font-size:.7rem;color:var(--muted)}
.winner-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-weight:700;font-size:.72rem;letter-spacing:.02em}
.winner-a{background:var(--team-a-dim);color:var(--team-a)}
.winner-b{background:var(--team-b-dim);color:var(--team-b)}
.winner-tie{background:var(--surface);color:var(--muted)}
.matchup-note{font-size:.73rem;color:var(--text2);margin-top:4px;font-style:italic;line-height:1.4}

.verdict{background:linear-gradient(135deg,var(--surface),var(--card));border-radius:var(--radius-sm);padding:20px 22px;border:1px solid var(--border2)}
.verdict h3{font-size:.9rem;font-weight:700;margin-bottom:10px;color:var(--accent2)}
.verdict p{font-size:.87rem;color:var(--text2);line-height:1.7}
.verdict strong{color:var(--text)}

.scorecard{max-width:1120px;margin:24px auto 0}
.score-summary{display:flex;justify-content:center;align-items:center;gap:28px;margin-bottom:20px;padding:8px 0}
.score-block{text-align:center}
.score-num{font-size:2.4rem;font-weight:900;line-height:1}
.score-label{font-size:.72rem;color:var(--muted);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.score-vs{font-size:1rem;color:var(--muted);font-weight:800;opacity:.4}

.history{max-height:none}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;transition:all .2s;cursor:pointer}
.history-item:hover{border-color:var(--border2);background:var(--surface)}
.history-summary{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;gap:12px}
.history-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.history-indicator{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.history-indicator.win-a{background:var(--team-a)}
.history-indicator.win-b{background:var(--team-b)}
.history-teams{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-score{font-size:.8rem;color:var(--text2);font-weight:600;white-space:nowrap}
.history-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.history-time{font-size:.72rem;color:var(--muted);font-weight:500}
.expand-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;transition:transform .2s,color .15s;font-size:.9rem}
.expand-btn:hover{color:var(--text)}
.expand-btn.open{transform:rotate(180deg)}
.delete-btn{background:none;border:1px solid transparent;border-radius:6px;color:var(--muted);cursor:pointer;padding:3px 8px;font-size:.72rem;font-family:inherit;font-weight:600;transition:all .15s}
.delete-btn:hover{color:var(--red);border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.08)}

.history-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.history-detail.show{display:block}
.detail-win-bar{margin:12px 0}
.detail-section{margin-top:14px}
.detail-section h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;font-weight:700}
.detail-section p{font-size:.83rem;color:var(--text2);line-height:1.6}
.detail-matchups{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:6px}
.detail-matchups td{padding:6px 10px;border-bottom:1px solid var(--border)}
.detail-matchups tr:last-child td{border-bottom:none}

.empty-history{text-align:center;color:var(--muted);font-size:.85rem;padding:32px 0;font-weight:500}
.btn-ghost{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:.78rem;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.btn-ghost:hover{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.06)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

.traj-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-left:4px}
.traj-ascending{background:rgba(46,204,113,.15);color:#2ecc71}
.traj-peak{background:rgba(241,196,15,.15);color:#f1c40f}
.traj-stable{background:rgba(149,165,166,.15);color:#95a5a6}
.traj-declining{background:rgba(231,76,60,.12);color:#e07060}
</style>
</head>
<body>

<div class="header">
  <h1>Starting 5 Simulator</h1>
  <p>Build two NBA lineups. Simulate the matchup. Study the breakdown.</p>
</div>

<div class="arena">
  <div class="team-card team-a">
    <div class="team-stripe"></div>
    <div class="team-header"><div class="team-dot"></div><input type="text" id="teamAName" value="Miami Heat" spellcheck="false"></div>
    <div class="roster" id="rosterA"></div>
  </div>
  <div class="vs-col">
    <div class="vs-badge">VS</div>
    <button class="sim-btn" onclick="simulate()">Simulate</button>
  </div>
  <div class="team-card team-b">
    <div class="team-stripe"></div>
    <div class="team-header"><div class="team-dot"></div><input type="text" id="teamBName" value="New York Knicks" spellcheck="false"></div>
    <div class="roster" id="rosterB"></div>
  </div>
</div>

<div class="results-panel" id="resultsPanel">
  <div class="panel">
    <div class="panel-header">
      <h2 id="resultsTitle">Simulation Results</h2>
      <span class="panel-badge" style="background:var(--accent-glow);color:var(--accent2)">LATEST</span>
    </div>
    <div class="panel-body">
      <div class="win-prob">
        <div class="win-prob-labels"><span class="team-a-label" id="barLabelA"></span><span class="team-b-label" id="barLabelB"></span></div>
        <div class="win-bar"><div class="bar-a" id="barA"></div><div class="bar-b" id="barB"></div></div>
      </div>
      <div class="analysis-grid" id="analysisGrid"></div>
      <table class="matchup-table">
        <thead><tr><th>Pos</th><th id="colA">Team A</th><th>Edge</th><th id="colB">Team B</th><th>Breakdown</th></tr></thead>
        <tbody id="matchupBody"></tbody>
      </table>
      <div class="verdict" id="verdict"></div>
    </div>
  </div>
</div>

<div class="scorecard panel" id="scorecardPanel">
  <div class="panel-header">
    <h2>All-Time Series</h2>
    <button class="btn-ghost" onclick="resetScorecard()">Reset All</button>
  </div>
  <div class="panel-body">
    <div class="score-summary">
      <div class="score-block"><div class="score-num" id="winsA" style="color:var(--team-a)">0</div><div class="score-label" id="winsALabel">Wins</div></div>
      <div class="score-vs">vs</div>
      <div class="score-block"><div class="score-num" id="winsB" style="color:var(--team-b)">0</div><div class="score-label" id="winsBLabel">Wins</div></div>
    </div>
    <div class="history" id="history"><div class="empty-history">No simulations yet — run your first matchup.</div></div>
  </div>
</div>

// ══════════════════════════════════════════════════════════
// ENGINE: Stats-weighted simulation (60% recent stats, 20% accolades, 20% intangibles)
// ══════════════════════════════════════════════════════════

const POSITIONS = ["PG","SG","SF","PF","C"];
const POS_FULL = {PG:"Point Guard",SG:"Shooting Guard",SF:"Small Forward",PF:"Power Forward",C:"Center"};
let scorecard = {history:[]};
let expandedId = null;

// ── Roster UI ──
function buildRoster(containerId, team) {
  const container = document.getElementById(containerId);
  POSITIONS.forEach(pos => {
    const row = document.createElement('div');
    row.className = 'pos-row';
    row.innerHTML = `<div class="pos-label">${pos}</div>
      <input type="text" placeholder="${POS_FULL[pos]}..." data-team="${team}" data-pos="${pos}" autocomplete="off" spellcheck="false">
      <div class="ac-list"></div>`;
    container.appendChild(row);
    const input = row.querySelector('input'), acList = row.querySelector('.ac-list');
    let aIdx = -1;
    input.addEventListener('input', () => {
      const v = input.value.trim().toLowerCase();
      acList.innerHTML = ''; aIdx = -1;
      if (v.length < 1) { acList.classList.remove('show'); return; }
      const m = PLAYERS.filter(p => p.name.toLowerCase().includes(v)).slice(0, 8);
      if (!m.length) { acList.classList.remove('show'); return; }
      m.forEach(p => {
        const it = document.createElement('div');
        it.className = 'ac-item';
        const s = p.stats;
        const statLine = s ? `${s.ppg}p/${s.rpg}r/${s.apg}a` : '';
        it.innerHTML = `<span class="ac-name">${p.name}</span><span class="ac-meta"><span class="ac-stats">${statLine}</span><span class="ac-pos">${p.pos}</span><span class="ac-ovr">${p.ovr}</span></span>`;
        it.addEventListener('mousedown', e => { e.preventDefault(); input.value = p.name; acList.classList.remove('show'); });
        acList.appendChild(it);
      });
      acList.classList.add('show');
    });
    input.addEventListener('keydown', e => {
      const its = acList.querySelectorAll('.ac-item');
      if (!its.length) return;
      if (e.key==='ArrowDown'){e.preventDefault();aIdx=Math.min(aIdx+1,its.length-1);upAc(its)}
      else if(e.key==='ArrowUp'){e.preventDefault();aIdx=Math.max(aIdx-1,0);upAc(its)}
      else if(e.key==='Enter'&&aIdx>=0){e.preventDefault();its[aIdx].dispatchEvent(new MouseEvent('mousedown'))}
      else if(e.key==='Escape'){acList.classList.remove('show')}
    });
    input.addEventListener('blur', () => setTimeout(() => acList.classList.remove('show'), 150));
    function upAc(its){its.forEach((el,i)=>el.classList.toggle('active',i===aIdx))}
  });
}
buildRoster('rosterA','a');
buildRoster('rosterB','b');

// ── Player Lookup ──
function findPlayer(name) { return PLAYERS.find(p => p.name.toLowerCase() === name.trim().toLowerCase()); }
function makeCustomPlayer(name, pos) {
  return {name, pos, ovr:75, scoring:75, playmaking:70, defense:72, shooting:72, rebounding:65, iq:72,
    stats:{ppg:12.0,rpg:4.0,apg:2.5,spg:0.7,bpg:0.3,fgPct:.440,threePct:.330,tsPct:.540,per:12.0,bpm:0.0,trajectory:"stable"},
    accolades:"--",style:"role player",scheme:"standard",strengths:["effort","energy","hustle"],slotPos:pos};
}

// ══════════════════════════════════════════════════════════
// SCORING ENGINE — weights recent stats over career accolades
// ══════════════════════════════════════════════════════════

// Recent performance score (0-100) — weighted 60%
function recentPerfScore(p) {
  const s = p.stats;
  if (!s) return 50;
  let score = 0;
  // Volume scoring: ppg normalized (35ppg = 100)
  score += Math.min(s.ppg / 35, 1) * 22;
  // Efficiency: TS% (league avg ~.570, elite ~.650)
  score += Math.min(Math.max((s.tsPct - .500) / .160, 0), 1) * 18;
  // PER (league avg 15, elite 30+)
  score += Math.min(s.per / 32, 1) * 15;
  // BPM (0 = avg, 10+ = MVP)
  score += Math.min(Math.max((s.bpm + 2) / 15, 0), 1) * 15;
  // Playmaking: apg normalized
  score += Math.min(s.apg / 10, 1) * 8;
  // Rebounding
  score += Math.min(s.rpg / 13, 1) * 6;
  // Stocks (steals + blocks)
  score += Math.min((s.spg + s.bpg) / 4, 1) * 8;
  // 3pt shooting bonus
  score += Math.min(Math.max((s.threePct - .300) / .120, 0), 1) * 8;
  // Trajectory modifier
  if (s.trajectory === 'ascending') score *= 1.06;
  else if (s.trajectory === 'declining') score *= 0.93;
  return score;
}

// Accolades score (0-100) — weighted 20%
function accoladesScore(p) {
  const a = (p.accolades || '').toLowerCase();
  if (a === '--' || !a) return 5;
  let score = 0;
  const num = (pat) => { const m = a.match(new RegExp(`(\\d+)x\\s*${pat}`)); return m ? parseInt(m[1]) : a.includes(pat) ? 1 : 0; };
  score += num('mvp') * 15;
  score += num('champ') * 10;
  score += num('finals mvp') * 10;
  score += num('dpoy') * 10;
  score += num('all-nba') * 4;
  score += num('all-star') * 2;
  score += num('all-defensive') * 3;
  score += num('mip') * 2;
  score += num('roy') * 2;
  score += num('scoring champ') * 5;
  score += num('assist leader') * 3;
  score += num('blocks leader') * 3;
  score += num('steals leader') * 3;
  // Diminish historical weight — cap at 80 to prevent legends from dominating on accolades alone
  return Math.min(score, 80);
}

// Intangibles score (0-100) — weighted 20% (from attribute ratings)
function intangiblesScore(p) {
  return (p.defense * .30 + p.iq * .30 + p.playmaking * .20 + p.shooting * .20) / 100 * 100;
}

// Combined matchup score for head-to-head
function calcPlayerScore(p, opp) {
  const recent = recentPerfScore(p) * 0.60;
  const accs = accoladesScore(p) * 0.20;
  const intang = intangiblesScore(p) * 0.20;
  let total = recent + accs + intang;

  // Head-to-head adjustments
  // Defensive matchup: strong defender vs high scorer
  if (p.defense > 84 && opp.stats && opp.stats.ppg > 25) total += 2;
  if (p.stats && opp.defense > 84 && p.stats.ppg > 25) total -= 1;
  // Efficiency bonus in matchup
  if (p.stats && p.stats.tsPct > .610) total += 1.5;
  // Shooting advantage creates spacing pressure
  if (p.stats && p.stats.threePct > .380 && opp.defense < 80) total += 1.5;

  return total;
}

function calcSynergy(roster) {
  let b = 0;
  const shooters = roster.filter(p => p.stats && p.stats.threePct >= .360).length;
  b += shooters * 2;
  const bestPM = Math.max(...roster.map(p => p.stats ? p.stats.apg : 0));
  b += bestPM > 8 ? 4 : bestPM > 6 ? 2.5 : bestPM > 4 ? 1 : 0;
  const avgDef = roster.reduce((s,p) => s + p.defense, 0) / 5;
  b += avgDef >= 84 ? 3.5 : avgDef >= 78 ? 2 : 0;
  const avgIQ = roster.reduce((s,p) => s + p.iq, 0) / 5;
  b += avgIQ >= 88 ? 2.5 : avgIQ >= 84 ? 1 : 0;
  // Combined TS% bonus
  const avgTS = roster.reduce((s,p) => s + (p.stats ? p.stats.tsPct : .540), 0) / 5;
  b += avgTS >= .600 ? 3 : avgTS >= .580 ? 1.5 : 0;
  return b;
}

function evaluateSchemefit(roster) {
  const allText = roster.map(p => `${p.style||''} ${p.scheme||''}`).join(' ').toLowerCase();
  let fit = 50;
  fit += ((allText.match(/motion|off-ball|catch-and-shoot|off-screen/g)||[]).length) * 4;
  fit += ((allText.match(/switch/g)||[]).length) * 3;
  const isoCount = (allText.match(/\biso\b/g)||[]).length;
  if (isoCount > 2) fit -= (isoCount - 2) * 6;
  const pnrH = roster.filter(p => (p.scheme||'').toLowerCase().includes('pnr') && p.playmaking >= 80).length;
  const rollers = roster.filter(p => (p.scheme||'').toLowerCase().match(/roller|lob/)).length;
  if (pnrH > 0 && rollers > 0) fit += 8;
  const spacers = roster.filter(p => p.stats && p.stats.threePct >= .350).length;
  if (spacers < 2) fit -= 10;
  if (spacers >= 4) fit += 5;
  return Math.max(20, Math.min(98, fit));
}

function countAccolades(roster) {
  let mvps=0,rings=0,allstars=0,allnba=0,dpoys=0,fmvps=0;
  roster.forEach(p => {
    const a = (p.accolades||'').toLowerCase();
    const n = (pat) => { const m = a.match(new RegExp(`(\\d+)x\\s*${pat}`)); return m ? parseInt(m[1]) : a.includes(pat) ? 1 : 0; };
    mvps += n('mvp') - n('finals mvp'); rings += n('champ'); allstars += n('all-star');
    allnba += n('all-nba'); dpoys += n('dpoy'); fmvps += n('finals mvp');
  });
  return {mvps,rings,allstars,allnba,dpoys,fmvps};
}

// Team aggregate stats
function teamStats(roster) {
  const avg = (fn) => (roster.reduce((s,p) => s + fn(p), 0) / 5).toFixed(1);
  const avgPct = (fn) => (roster.reduce((s,p) => s + fn(p), 0) / 5 * 100).toFixed(1);
  return {
    ppg: avg(p => p.stats ? p.stats.ppg : 12),
    rpg: avg(p => p.stats ? p.stats.rpg : 4),
    apg: avg(p => p.stats ? p.stats.apg : 2),
    tsPct: avgPct(p => p.stats ? p.stats.tsPct : .540),
    per: avg(p => p.stats ? p.stats.per : 12),
    bpm: avg(p => p.stats ? p.stats.bpm : 0),
    threePct: avgPct(p => p.stats ? p.stats.threePct : .330),
  };
}

function getMatchupNarrative(a, b, pos) {
  const sa = a.stats, sb = b.stats;
  let lines = [];

  // Stats-driven narrative
  if (sa && sb) {
    if (sa.ppg >= 25 && sb.ppg >= 25) {
      lines.push(`A heavyweight scoring duel: ${a.name} at ${sa.ppg} PPG (${(sa.tsPct*100).toFixed(1)}% TS) vs ${b.name} at ${sb.ppg} PPG (${(sb.tsPct*100).toFixed(1)}% TS).`);
    } else if (sa.ppg >= 25 || sb.ppg >= 25) {
      const star = sa.ppg >= 25 ? a : b;
      const other = sa.ppg >= 25 ? b : a;
      const ss = star.stats, os = other.stats;
      lines.push(`${star.name}'s ${ss.ppg} PPG scoring load dwarfs ${other.name}'s ${os.ppg}, but ${other.name} contributes through ${os.apg >= 5 ? `playmaking (${os.apg} APG)` : os.rpg >= 8 ? `rebounding (${os.rpg} RPG)` : `defense (${other.defense} DEF)`}.`);
    }

    // Efficiency comparison
    if (Math.abs(sa.tsPct - sb.tsPct) > .030) {
      const eff = sa.tsPct > sb.tsPct ? a : b;
      const es = eff.stats;
      lines.push(`${eff.name} holds a significant efficiency edge at ${(es.tsPct*100).toFixed(1)}% TS — more impactful per possession.`);
    }

    // Defensive matchup
    if (a.defense >= 85 && sb.ppg >= 22) {
      lines.push(`${a.name}'s elite defense (${a.defense} DEF, ${sa.spg+sa.bpg > 2 ? (sa.spg+sa.bpg).toFixed(1)+' stocks' : sa.spg+' STL'}) will contest ${b.name}'s volume scoring.`);
    } else if (b.defense >= 85 && sa.ppg >= 22) {
      lines.push(`${b.name}'s lockdown defense (${b.defense} DEF) presents a real challenge for ${a.name}'s ${sa.ppg} PPG output.`);
    }
  }

  // Style clash
  if (a.style && b.style && a.style !== b.style) {
    lines.push(`Style contrast: ${a.name}'s ${a.style} approach vs ${b.name}'s ${b.style} identity.`);
  }

  // Trajectory
  if (sa && sb && sa.trajectory !== sb.trajectory) {
    const asc = [a,b].find(p => p.stats.trajectory === 'ascending');
    const dec = [a,b].find(p => p.stats.trajectory === 'declining');
    if (asc && dec) lines.push(`${asc.name} is trending upward while ${dec.name}'s production has dipped — trajectory favors ${asc.name}.`);
  }

  if (!lines.length) {
    lines.push(`A solid ${POS_FULL[pos]} matchup with ${a.name}'s ${(a.strengths||[])[0]||'game'} tested by ${b.name}'s ${(b.strengths||[])[0]||'game'}.`);
  }
  return lines.join(' ');
}

// SIMULATE
// ══════════════════════════════════════════════════════════
function simulate() {
  const teamAName = document.getElementById('teamAName').value || 'Team A';
  const teamBName = document.getElementById('teamBName').value || 'Team B';
  const inputsA = document.querySelectorAll('#rosterA input');
  const inputsB = document.querySelectorAll('#rosterB input');
  const rosterA = [], rosterB = [];
  let valid = true;
  inputsA.forEach((inp,i) => {
    const p = findPlayer(inp.value);
    if (p) rosterA.push({...p,slotPos:POSITIONS[i]});
    else if (inp.value.trim()) rosterA.push(makeCustomPlayer(inp.value.trim(),POSITIONS[i]));
    else valid = false;
  });
  inputsB.forEach((inp,i) => {
    const p = findPlayer(inp.value);
    if (p) rosterB.push({...p,slotPos:POSITIONS[i]});
    else if (inp.value.trim()) rosterB.push(makeCustomPlayer(inp.value.trim(),POSITIONS[i]));
    else valid = false;
  });
  if (!valid || rosterA.length < 5 || rosterB.length < 5) return;

  const matchups = [];
  let totalA = 0, totalB = 0;
  for (let i = 0; i < 5; i++) {
    const a = rosterA[i], b = rosterB[i];
    const sA = calcPlayerScore(a,b), sB = calcPlayerScore(b,a);
    totalA += sA; totalB += sB;
    matchups.push({pos:POSITIONS[i],a,b,scoreA:sA,scoreB:sB,
      winner:sA>sB?'A':sA<sB?'B':'TIE',
      narrative:getMatchupNarrative(a,b,POSITIONS[i])});
  }

  // ── Positional Dominance ──
  let posWinsA = 0, posWinsB = 0;
  const posMargins = [];
  matchups.forEach(m => {
    const margin = Math.abs(m.scoreA - m.scoreB);
    const dominance = margin > 8 ? 'dominant' : margin > 4 ? 'clear' : 'slim';
    posMargins.push({pos:m.pos, margin:margin.toFixed(1), dominance, winner:m.winner});
    if (m.winner === 'A') posWinsA++;
    else if (m.winner === 'B') posWinsB++;
  });

  // Per-position win bonus (+2 each)
  let posBonusA = posWinsA * 2;
  let posBonusB = posWinsB * 2;
  // Sweep bonus: winning 4+ positions = +5 extra, sweeping all 5 = +8 extra
  if (posWinsA >= 5) posBonusA += 8;
  else if (posWinsA >= 4) posBonusA += 5;
  if (posWinsB >= 5) posBonusB += 8;
  else if (posWinsB >= 4) posBonusB += 5;

  totalA += posBonusA; totalB += posBonusB;

  const synA = calcSynergy(rosterA), synB = calcSynergy(rosterB);
  totalA += synA; totalB += synB;
  totalA += (Math.random()-.5)*5; totalB += (Math.random()-.5)*5;

  const pctA = Math.max(5,Math.min(95,Math.round(totalA/(totalA+totalB)*100)));
  const pctB = 100 - pctA;
  const winner = pctA >= pctB ? 'A' : 'B';

  const simData = {
    id:Date.now(), teamA:teamAName, teamB:teamBName,
    rosterA, rosterB, matchups, pctA, pctB, winner,
    synA, synB, posWinsA, posWinsB, posBonusA, posBonusB, posMargins,
    schemeA:evaluateSchemefit(rosterA), schemeB:evaluateSchemefit(rosterB),
    accA:countAccolades(rosterA), accB:countAccolades(rosterB),
    tsA:teamStats(rosterA), tsB:teamStats(rosterB),
    time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    date:new Date().toLocaleDateString([],{month:'short',day:'numeric'})
  };

  renderLiveResults(simData);
  scorecard.history.unshift(simData);
  if (scorecard.history.length > 20) scorecard.history.pop();
  renderScorecard();
}

function renderLiveResults(d) {
  const panel = document.getElementById('resultsPanel');
  panel.classList.add('show');
  document.getElementById('resultsTitle').textContent = `${d.teamA} vs ${d.teamB}`;
  document.getElementById('colA').textContent = d.teamA;
  document.getElementById('colB').textContent = d.teamB;
  document.getElementById('barLabelA').textContent = `${d.teamA}  ${d.pctA}%`;
  document.getElementById('barLabelB').textContent = `${d.pctB}%  ${d.teamB}`;
  document.getElementById('barA').style.width = d.pctA+'%';
  document.getElementById('barA').textContent = d.pctA>12?d.pctA+'%':'';
  document.getElementById('barB').style.width = d.pctB+'%';
  document.getElementById('barB').textContent = d.pctB>12?d.pctB+'%':'';

  document.getElementById('analysisGrid').innerHTML = buildAnalysisCards(d);

  const tbody = document.getElementById('matchupBody');
  tbody.innerHTML = '';
  d.matchups.forEach(m => {
    const wCls = m.winner==='A'?'winner-a':m.winner==='B'?'winner-b':'winner-tie';
    const wTxt = m.winner==='A'?d.teamA:m.winner==='B'?d.teamB:'Even';
    const sa = m.a.stats, sb = m.b.stats;
    const statA = sa ? `${sa.ppg}p / ${sa.rpg}r / ${sa.apg}a | ${(sa.tsPct*100).toFixed(1)}% TS` : '';
    const statB = sb ? `${sb.ppg}p / ${sb.rpg}r / ${sb.apg}a | ${(sb.tsPct*100).toFixed(1)}% TS` : '';
    const trajA = sa ? sa.trajectory : '';
    const trajB = sb ? sb.trajectory : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${m.pos}</strong></td>
      <td><div class="player-cell"><span class="player-name">${m.a.name}${trajBadge(trajA)}</span><span class="player-stats">${statA}</span><span class="player-detail">${m.a.ovr} OVR &middot; ${m.a.style||''}</span></div></td>
      <td><span class="winner-badge ${wCls}">${wTxt}</span></td>
      <td><div class="player-cell"><span class="player-name">${m.b.name}${trajBadge(trajB)}</span><span class="player-stats">${statB}</span><span class="player-detail">${m.b.ovr} OVR &middot; ${m.b.style||''}</span></div></td>
      <td><div class="matchup-note">${m.narrative}</div></td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('verdict').innerHTML = buildVerdict(d);
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function trajBadge(t) {
  if (!t || t==='stable') return '';
  const labels = {ascending:'Rising',peak:'Peak',declining:'Declining'};
  return ` <span class="traj-badge traj-${t}">${labels[t]||t}</span>`;
}

function buildAnalysisCards(d) {
  const {teamA,teamB,schemeA,schemeB,accA,accB,tsA,tsB,rosterA,rosterB} = d;

  // Stats comparison card
  const statRow = (label,va,vb,higherBetter=true) => {
    const a=parseFloat(va),b=parseFloat(vb);
    const aw = higherBetter ? a>b : a<b;
    const bw = higherBetter ? b>a : b<a;
    return `<div class="sg-row"><span class="sg-label">${label}</span><span class="sg-val-a ${aw?'sg-val-win':''}">${va}</span><span class="sg-val-b ${bw?'sg-val-win':''}">${vb}</span></div>`;
  };

  const statsCard = `<div class="analysis-card"><h3>Recent Performance (Last 3 Years)</h3>
    <p style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Team averages — <span class="hl">underlined = advantage</span>. Current production weighted 60% in simulation.</p>
    <div style="display:grid;grid-template-columns:auto 1fr 1fr;gap:0;font-size:.78rem">
      <div class="sg-row" style="border-bottom:1px solid var(--border2)"><span class="sg-label">STAT</span><span class="sg-val-a" style="font-size:.68rem">${teamA}</span><span class="sg-val-b" style="font-size:.68rem">${teamB}</span></div>
      ${statRow('PPG',tsA.ppg,tsB.ppg)}
      ${statRow('RPG',tsA.rpg,tsB.rpg)}
      ${statRow('APG',tsA.apg,tsB.apg)}
      ${statRow('TS%',tsA.tsPct+'%',tsB.tsPct+'%')}
      ${statRow('3PT%',tsA.threePct+'%',tsB.threePct+'%')}
      ${statRow('PER',tsA.per,tsB.per)}
      ${statRow('BPM',tsA.bpm,tsB.bpm)}
    </div></div>`;

  // Accolades
  const fmtAcc = a => `${a.mvps} MVP, ${a.rings} Rings, ${a.fmvps} FMVP, ${a.dpoys} DPOY, ${a.allnba} All-NBA, ${a.allstars} All-Star`;
  const accTotalA = accA.mvps*5+accA.rings*4+accA.fmvps*4+accA.dpoys*3+accA.allnba*2+accA.allstars;
  const accTotalB = accB.mvps*5+accB.rings*4+accB.fmvps*4+accB.dpoys*3+accB.allnba*2+accB.allstars;
  const accLead = accTotalA>accTotalB?teamA:accTotalB>accTotalA?teamB:'Even';
  const accCard = `<div class="analysis-card"><h3>Accolades & Pedigree (20% weight)</h3>
    <p><span class="hl">${teamA}:</span> ${fmtAcc(accA)}<br><span class="hl">${teamB}:</span> ${fmtAcc(accB)}<br><br>
    ${accLead!=='Even'?`<span class="hl">${accLead}</span> has more proven hardware — but accolades are weighted at only 20%, so current production can override legacy.`:'Comparable accolades on both sides.'}</p></div>`;

  // Scheme
  const sLead = schemeA>schemeB?teamA:schemeB>schemeA?teamB:'Even';
  const schemeCard = `<div class="analysis-card"><h3>Style & Scheme Fit</h3>
    <p><span class="hl">${teamA}:</span> ${schemeA}/100 &nbsp;&middot;&nbsp; <span class="hl">${teamB}:</span> ${schemeB}/100<br><br>
    ${sLead!=='Even'?`${sLead} runs a more cohesive system — better role clarity, spacing compatibility, and fewer ball-dominance conflicts.`:'Both teams show comparable scheme cohesion.'}</p></div>`;

  // Synergy + Trajectory
  const ascA = rosterA.filter(p=>p.stats&&p.stats.trajectory==='ascending').length;
  const ascB = rosterB.filter(p=>p.stats&&p.stats.trajectory==='ascending').length;
  const decA = rosterA.filter(p=>p.stats&&p.stats.trajectory==='declining').length;
  const decB = rosterB.filter(p=>p.stats&&p.stats.trajectory==='declining').length;
  const synCard = `<div class="analysis-card"><h3>Synergy & Trajectory</h3>
    <p><span class="hl">${teamA}:</span> ${rosterA.filter(p=>p.stats&&p.stats.threePct>=.360).length} 3pt shooters, ${(rosterA.reduce((s,p)=>s+p.defense,0)/5).toFixed(0)} avg DEF, ${ascA} rising / ${decA} declining<br>
    <span class="hl">${teamB}:</span> ${rosterB.filter(p=>p.stats&&p.stats.threePct>=.360).length} 3pt shooters, ${(rosterB.reduce((s,p)=>s+p.defense,0)/5).toFixed(0)} avg DEF, ${ascB} rising / ${decB} declining<br><br>
    ${ascA>ascB+1?`${teamA} has more ascending talent — their upward trajectory suggests a higher ceiling going forward.`:ascB>ascA+1?`${teamB} has more ascending talent — youth and improvement trajectory favor their side.`:'Similar trajectory profiles on both rosters — neither side has a clear youth or momentum edge.'}</p></div>`;

  // Positional Dominance card
  const {posWinsA:pwA,posWinsB:pwB,posBonusA:pbA,posBonusB:pbB,posMargins:pm} = d;
  const posDomLead = (pwA||0)>(pwB||0)?teamA:(pwB||0)>(pwA||0)?teamB:'Even';
  let posRows = '';
  if (pm && pm.length) {
    pm.forEach(p => {
      const wLabel = p.winner==='A'?teamA:p.winner==='B'?teamB:'Tie';
      const barColor = p.winner==='A'?'var(--accent)':p.winner==='B'?'var(--accent2)':'var(--muted)';
      const barW = Math.min(100, parseFloat(p.margin)*5+10);
      posRows += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.76rem">
        <span style="width:28px;font-weight:700">${p.pos}</span>
        <div style="flex:1;height:14px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${barColor};border-radius:4px;transition:width .3s"></div>
        </div>
        <span style="width:70px;text-align:right;color:${barColor};font-weight:600">${wLabel}</span>
        <span style="width:40px;text-align:right;color:var(--muted);font-size:.68rem">${p.dominance}</span>
      </div>`;
    });
  }
  const posCard = `<div class="analysis-card"><h3>Positional Dominance</h3>
    <p style="font-size:.72rem;color:var(--muted);margin-bottom:8px">Head-to-head positional battles directly impact win probability. Each position won adds +2 pts; winning 4+ adds +5 bonus; sweeping all 5 adds +8 bonus.</p>
    <div style="margin-bottom:10px">${posRows}</div>
    <p style="font-size:.78rem"><span class="hl">${teamA}:</span> ${pwA||0}/5 positions won (+${pbA||0} bonus pts) &nbsp;&middot;&nbsp; <span class="hl">${teamB}:</span> ${pwB||0}/5 positions won (+${pbB||0} bonus pts)<br><br>
    ${posDomLead!=='Even'?`<strong>${posDomLead}</strong> controls the majority of individual matchups, earning a meaningful simulation bonus that tilts the overall outcome.`:'Positional battles are split evenly — neither team gains a dominance bonus edge.'}</p></div>`;

  return statsCard + accCard + schemeCard + posCard + synCard;
}

function buildVerdict(d) {
  const {teamA,teamB,pctA,pctB,winner,matchups,rosterA,rosterB,synA,synB,accA,accB,tsA,tsB,posWinsA,posWinsB,posBonusA,posBonusB} = d;
  const wName = winner==='A'?teamA:teamB;
  const lName = winner==='A'?teamB:teamA;
  const wPct = winner==='A'?pctA:pctB;
  const wPosWins = winner==='A'?(posWinsA||0):(posWinsB||0);
  const lPosWins = winner==='A'?(posWinsB||0):(posWinsA||0);
  const wPosBonus = winner==='A'?(posBonusA||0):(posBonusB||0);
  const margin = Math.abs(pctA-pctB);
  const closeness = margin<=4?"a razor-thin margin":margin<=10?"a solid advantage":margin<=18?"a clear advantage":"a commanding advantage";

  // Find best recent performer (by PER)
  const bestRecentA = [...rosterA].sort((a,b)=>(b.stats?b.stats.per:0)-(a.stats?a.stats.per:0))[0];
  const bestRecentB = [...rosterB].sort((a,b)=>(b.stats?b.stats.per:0)-(a.stats?a.stats.per:0))[0];

  let v = `<h3>Expert Verdict</h3><p>`;
  v += `<strong>${wName}</strong> takes this matchup with ${closeness} at <strong>${wPct}% win probability</strong>, winning ${wPosWins} of 5 positional battles. `;

  // Positional dominance context
  if (wPosWins >= 5) {
    v += `A clean sweep across all five positions earned a massive +${wPosBonus} pt dominance bonus — ${wName} is simply deeper and better at every spot. `;
  } else if (wPosWins >= 4) {
    v += `Winning ${wPosWins} of 5 head-to-head matchups earns ${wName} a +${wPosBonus} pt positional dominance bonus, significantly tilting the simulation. `;
  } else if (wPosWins >= 3) {
    v += `${wName} edges out the positional battle ${wPosWins}-${lPosWins}, earning a +${wPosBonus} pt bonus from individual matchup dominance. `;
  } else {
    v += `Despite losing the positional head-to-head count ${wPosWins}-${lPosWins}, ${wName}'s aggregate statistical edge still carries the day. `;
  }

  // Stats-grounded verdict
  const wTS = winner==='A'?tsA:tsB;
  const lTS = winner==='A'?tsB:tsA;
  v += `Current production remains the heaviest factor: ${wName}'s roster averages ${wTS.ppg} PPG on ${wTS.tsPct}% TS with a ${wTS.per} PER, `;
  v += `compared to ${lName}'s ${lTS.ppg} PPG on ${lTS.tsPct}% TS (${lTS.per} PER). `;

  v += `${bestRecentA.name} (${bestRecentA.stats?bestRecentA.stats.per+' PER':'—'}) anchors ${teamA}, while ${bestRecentB.name} (${bestRecentB.stats?bestRecentB.stats.per+' PER':'—'}) leads ${teamB}. `;

  // Accolades context
  const accTotalA = accA.mvps*5+accA.rings*4+accA.fmvps*4;
  const accTotalB = accB.mvps*5+accB.rings*4+accB.fmvps*4;
  const hwEdge = accTotalA>accTotalB?teamA:accTotalB>accTotalA?teamB:null;
  if (hwEdge && hwEdge !== wName) {
    v += `Despite ${hwEdge}'s superior championship pedigree, current statistical output and positional matchup results give ${wName} the edge. `;
  } else if (hwEdge === wName) {
    v += `${wName} also holds the accolades edge, reinforcing their positional dominance with proven winning pedigree. `;
  }

  if (margin <= 4) v += `This is essentially a coin flip — either squad could win on any given night.`;
  else if (margin <= 10) v += `${lName} has a viable path through key individual outperformance, but ${wName}'s positional and statistical profile is stronger.`;
  else v += `${lName} would need career-best outings from multiple players to overcome ${wName}'s positional dominance and statistical superiority.`;

  v += `</p>`;
  return v;
}

// ══════════════════════════════════════════════════════════
// SCORECARD & HISTORY
// ══════════════════════════════════════════════════════════
function getWins() {
  let a=0,b=0;
  scorecard.history.forEach(h=>{if(h.winner==='A')a++;else b++;});
  return {a,b};
}

function renderScorecard() {
  const wins = getWins();
  const la = scorecard.history.length?scorecard.history[0].teamA:'Team A';
  const lb = scorecard.history.length?scorecard.history[0].teamB:'Team B';
  document.getElementById('winsA').textContent = wins.a;
  document.getElementById('winsB').textContent = wins.b;
  document.getElementById('winsALabel').textContent = la+' Wins';
  document.getElementById('winsBLabel').textContent = lb+' Wins';

  const hist = document.getElementById('history');
  if (!scorecard.history.length) {
    hist.innerHTML = '<div class="empty-history">No simulations yet — run your first matchup.</div>';
    return;
  }
  hist.innerHTML = '';
  scorecard.history.forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.id = 'hist-'+h.id;
    const isOpen = expandedId === h.id;
    item.innerHTML = `
      <div class="history-summary" onclick="toggleDetail(${h.id})">
        <div class="history-left">
          <div class="history-indicator ${h.winner==='A'?'win-a':'win-b'}"></div>
          <span class="history-teams">${h.teamA} vs ${h.teamB}</span>
        </div>
        <span class="history-score">${h.pctA}% — ${h.pctB}%</span>
        <div class="history-actions">
          <span class="history-time">${h.date} ${h.time}</span>
          <button class="expand-btn ${isOpen?'open':''}" onclick="event.stopPropagation();toggleDetail(${h.id})">&#9662;</button>
          <button class="delete-btn" onclick="event.stopPropagation();deleteSim(${h.id})">Remove</button>
        </div>
      </div>
      <div class="history-detail ${isOpen?'show':''}" id="detail-${h.id}">
        ${buildDetailHTML(h)}
      </div>`;
    hist.appendChild(item);
  });
}

function buildDetailHTML(d) {
  let html = '';
  html += `<div class="detail-win-bar">
    <div class="win-prob-labels" style="font-size:.78rem"><span class="team-a-label">${d.teamA} ${d.pctA}%</span><span class="team-b-label">${d.pctB}% ${d.teamB}</span></div>
    <div class="win-bar" style="height:24px;border-radius:6px"><div class="bar-a" style="width:${d.pctA}%;font-size:.72rem">${d.pctA>15?d.pctA+'%':''}</div><div class="bar-b" style="width:${d.pctB}%;font-size:.72rem">${d.pctB>15?d.pctB+'%':''}</div></div></div>`;

  // Team stats comparison
  if (d.tsA && d.tsB) {
    html += `<div class="detail-section"><h4>Recent Performance Comparison</h4>
      <p><strong>${d.teamA}:</strong> ${d.tsA.ppg} PPG, ${d.tsA.tsPct}% TS, ${d.tsA.per} PER, ${d.tsA.bpm} BPM<br>
      <strong>${d.teamB}:</strong> ${d.tsB.ppg} PPG, ${d.tsB.tsPct}% TS, ${d.tsB.per} PER, ${d.tsB.bpm} BPM</p></div>`;
  }

  // Scheme
  html += `<div class="detail-section"><h4>Style & Scheme Fit</h4>
    <p><strong>${d.teamA}:</strong> ${d.schemeA}/100 &middot; <strong>${d.teamB}:</strong> ${d.schemeB}/100 &middot; Edge: <strong>${d.schemeA>d.schemeB?d.teamA:d.schemeB>d.schemeA?d.teamB:'Even'}</strong></p></div>`;

  // Accolades
  const fA = a => `${a.mvps} MVP, ${a.rings} Rings, ${a.fmvps} FMVP, ${a.dpoys} DPOY`;
  html += `<div class="detail-section"><h4>Accolades</h4>
    <p><strong>${d.teamA}:</strong> ${fA(d.accA)}<br><strong>${d.teamB}:</strong> ${fA(d.accB)}</p></div>`;

  // Positional Dominance
  if (d.posMargins && d.posMargins.length) {
    html += `<div class="detail-section"><h4>Positional Dominance Impact</h4>
      <p style="font-size:.72rem;color:var(--text2);margin-bottom:6px">Each position won = +2 pts &middot; 4+ wins = +5 bonus &middot; Sweep = +8 bonus</p>
      <p><strong>${d.teamA}:</strong> ${d.posWinsA||0}/5 positions won (+${d.posBonusA||0} bonus pts) &nbsp;&middot;&nbsp; <strong>${d.teamB}:</strong> ${d.posWinsB||0}/5 positions won (+${d.posBonusB||0} bonus pts)</p></div>`;
  }

  // Matchups
  html += `<div class="detail-section"><h4>Positional Matchups</h4><table class="detail-matchups">`;
  d.matchups.forEach(m => {
    const wCls = m.winner==='A'?'winner-a':m.winner==='B'?'winner-b':'winner-tie';
    const wTxt = m.winner==='A'?d.teamA:m.winner==='B'?d.teamB:'Even';
    const sa = m.a.stats, sb = m.b.stats;
    const sLineA = sa ? `${sa.ppg}p/${sa.rpg}r/${sa.apg}a ${(sa.tsPct*100).toFixed(1)}%TS` : '';
    const sLineB = sb ? `${sb.ppg}p/${sb.rpg}r/${sb.apg}a ${(sb.tsPct*100).toFixed(1)}%TS` : '';
    html += `<tr>
      <td style="font-weight:700;width:30px">${m.pos}</td>
      <td>${m.a.name} <span style="color:var(--accent2);font-size:.68rem">${sLineA}</span></td>
      <td><span class="winner-badge ${wCls}" style="font-size:.68rem">${wTxt}</span></td>
      <td>${m.b.name} <span style="color:var(--accent2);font-size:.68rem">${sLineB}</span></td></tr>
      <tr><td></td><td colspan="3" style="padding-top:0;font-size:.72rem;color:var(--text2);font-style:italic;line-height:1.4;border-bottom:1px solid var(--border)">${m.narrative}</td></tr>`;
  });
  html += `</table></div>`;

  const wName = d.winner==='A'?d.teamA:d.teamB;
  const wPosW = d.winner==='A'?(d.posWinsA||0):(d.posWinsB||0);
  const margin = Math.abs(d.pctA-d.pctB);
  const closeness = margin<=4?"razor-thin":margin<=10?"solid":margin<=18?"clear":"commanding";
  const posNote = wPosW>=4?` Winning ${wPosW}/5 positional battles earned a significant dominance bonus.`:wPosW>=3?` Edging ${wPosW}/5 positional matchups contributed to the result.`:'';
  html += `<div class="detail-section"><h4>Verdict</h4>
    <p><strong>${wName}</strong> wins with a ${closeness} ${Math.max(d.pctA,d.pctB)}% win probability.${posNote} ${margin<=4?'A true toss-up — could go either way.':''}</p></div>`;
  return html;
}

function toggleDetail(id) {
  expandedId = expandedId===id ? null : id;
  renderScorecard();
}

function deleteSim(id) {
  scorecard.history = scorecard.history.filter(h=>h.id!==id);
  if (expandedId===id) expandedId = null;
  renderScorecard();
}

function resetScorecard() {
  scorecard.history = [];
  expandedId = null;
  renderScorecard();
}

renderScorecard();

</script>
</body>
</html>
